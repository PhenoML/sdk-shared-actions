name: Commit artifacts
description: >-
  Stages the given paths, commits them with the provided message, and pushes
  to the current branch — retrying on non-fast-forward by rebasing onto the
  new remote tip so it co-exists with anything else (another workflow, a human)
  pushing to the same branch concurrently. No-ops when the staged paths carry
  no changes. Assumes the caller has already checked out the target branch
  (with auth) and granted contents: write.

inputs:
  paths:
    description: >-
      Newline-separated list of files to stage and commit. Brand-new
      (previously untracked) files are detected too.
    required: true
  message:
    description: "Commit message."
    required: true

runs:
  using: composite
  steps:
    - name: Commit and push artifacts
      shell: bash
      env:
        PATHS: ${{ inputs.paths }}
        MESSAGE: ${{ inputs.message }}
        PUSH_WITH_RETRY: ${{ github.action_path }}/push-with-retry.sh
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        # Stage each requested path. `git add` is a no-op for unchanged files,
        # so listing a path that didn't change is harmless.
        while IFS= read -r path; do
          [ -n "$path" ] || continue
          git add -- "$path"
        done <<< "$PATHS"
        # --cached so brand-new (previously untracked) files count as changes;
        # plain `git diff` would report nothing for them.
        if git diff --cached --quiet; then
          echo "No staged changes; nothing to commit."
          exit 0
        fi
        git commit -m "$MESSAGE"
        bash "$PUSH_WITH_RETRY"
