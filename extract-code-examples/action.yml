name: Extract Code Examples
description: >-
  Parse a Fern-generated SDK (TypeScript, Python, or Java) and write a
  code-examples.json manifest mapping HTTP method + path to SDK call,
  request body, and response body.

inputs:
  root:
    description: Root directory of the SDK repo to parse.
    required: false
    default: ${{ github.workspace }}
  spec:
    description: >-
      Path to the bundled OpenAPI spec. Defaults to a per-language convention
      under the SDK root (see bundle-openapi-spec). Pass this only to override.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - name: Install extractor dependencies
      working-directory: ${{ github.action_path }}
      shell: bash
      run: bun install --frozen-lockfile

    - name: Extract code examples
      shell: bash
      env:
        ROOT: ${{ inputs.root }}
        SPEC: ${{ inputs.spec }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        args=(--root "$ROOT")
        if [ -n "$SPEC" ]; then args+=(--spec "$SPEC"); fi
        bun run "$ACTION_PATH/index.ts" "${args[@]}"
