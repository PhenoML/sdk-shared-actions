name: Extract Code Examples
description: >-
  Parse a Fern-generated SDK (TypeScript, Python, or Java) and write a
  code-examples.json manifest mapping HTTP method + path to SDK call,
  request body, and response body.

inputs:
  root:
    description: Root directory of the SDK repo to parse.
    required: false
    default: ${{ github.workspace }}

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - name: Install extractor dependencies
      working-directory: ${{ github.action_path }}
      shell: bash
      run: bun install --frozen-lockfile

    - name: Extract code examples
      shell: bash
      env:
        ROOT: ${{ inputs.root }}
        ACTION_PATH: ${{ github.action_path }}
      run: bun run "$ACTION_PATH/index.ts" --root "$ROOT"

    - name: Commit code-examples.json if changed
      shell: bash
      working-directory: ${{ inputs.root }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add code-examples.json
        if git diff --cached --quiet -- code-examples.json; then
          echo "code-examples.json unchanged; nothing to commit."
          exit 0
        fi
        git commit -m "chore: update code-examples.json"

        # Another workflow (or a human) can push to the same branch
        # concurrently. Retry on non-fast-forward by rebasing onto the
        # new remote tip; if the concurrent push didn't touch
        # code-examples.json the rebase replays cleanly, otherwise it
        # fails and we exit non-zero.
        attempt=1
        max_attempts=5
        while :; do
          push_output=$(git push 2>&1) && rc=0 || rc=$?
          printf '%s\n' "$push_output"
          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          if [ "$attempt" -ge "$max_attempts" ]; then
            echo "::error::push failed after $max_attempts attempts"
            exit 1
          fi
          if ! grep -qE '(rejected|non-fast-forward|fetch first)' <<< "$push_output"; then
            echo "::error::push failed for a non-race reason"
            exit 1
          fi
          echo "Push rejected (likely concurrent push); rebasing and retrying (attempt $attempt/$max_attempts)..."
          git pull --rebase --autostash
          attempt=$((attempt + 1))
          sleep 2
        done
