name: Bundle OpenAPI spec
description: >-
  Fetches the combined OpenAPI spec for an SDK's source commit from the
  public phenoml-openapi-specs GCS bucket and commits it back to the
  current branch if the file changed. Assumes the caller has already
  checked out the target branch (with auth) and granted contents: write.

inputs:
  metadata-path:
    description: "Path to Fern's metadata.json within the caller repo."
    default: ".fern/metadata.json"
  output-path:
    description: "Where to write the bundled spec within the caller repo."
    default: "openapi/openapi.json"

runs:
  using: composite
  steps:
    - name: Fetch combined OpenAPI spec
      shell: bash
      env:
        METADATA_PATH: ${{ inputs.metadata-path }}
        OUTPUT_PATH: ${{ inputs.output-path }}
      run: |
        commit_sha=$(jq -r .originGitCommit "$METADATA_PATH")
        if [ -z "$commit_sha" ] || [ "$commit_sha" = "null" ]; then
          echo "::error::originGitCommit missing from $METADATA_PATH"
          exit 1
        fi
        echo "Fetching OpenAPI spec for originGitCommit=$commit_sha"
        mkdir -p "$(dirname "$OUTPUT_PATH")"
        # Probe every 5s for up to ~5 minutes while the upstream GCS upload
        # may still be in flight. --retry-all-errors is needed to retry on
        # 404s (default --retry only retries 5xx/transient); --retry-delay
        # forces a fixed cadence (which disables curl's default exponential
        # backoff, so the retry count has to cover the whole budget itself).
        # --retry-max-time is a wall-clock safety net.
        curl --fail --silent --show-error \
          --retry 60 --retry-delay 5 --retry-max-time 300 --retry-all-errors \
          -o "$OUTPUT_PATH" \
          "https://storage.googleapis.com/phenoml-openapi-specs/combined/specs-${commit_sha}.json"

    - name: Commit spec if changed
      shell: bash
      env:
        METADATA_PATH: ${{ inputs.metadata-path }}
        OUTPUT_PATH: ${{ inputs.output-path }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add "$OUTPUT_PATH"
        # Use --cached so a brand-new (previously untracked) spec is also
        # detected; plain `git diff` would report no change for it.
        if git diff --cached --quiet -- "$OUTPUT_PATH"; then
          echo "Spec unchanged; nothing to commit."
          exit 0
        fi
        commit_sha=$(jq -r .originGitCommit "$METADATA_PATH")
        git commit -m "chore: bundle OpenAPI spec for ${commit_sha}"

        # extract-code-examples can push to the same branch concurrently
        # on Fern PRs. Retry on non-fast-forward by rebasing onto the new
        # remote tip — the two actions touch different files so rebase
        # should always be clean.
        attempt=1
        max_attempts=5
        while :; do
          push_output=$(git push 2>&1) && rc=0 || rc=$?
          printf '%s\n' "$push_output"
          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          if [ "$attempt" -ge "$max_attempts" ]; then
            echo "::error::push failed after $max_attempts attempts"
            exit 1
          fi
          if ! grep -qE '(rejected|non-fast-forward|fetch first)' <<< "$push_output"; then
            echo "::error::push failed for a non-race reason"
            exit 1
          fi
          echo "Push rejected (likely concurrent push); rebasing and retrying (attempt $attempt/$max_attempts)..."
          git pull --rebase --autostash
          attempt=$((attempt + 1))
          sleep 2
        done
