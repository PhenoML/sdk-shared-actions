name: Extract Code Examples

on:
  workflow_call:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # head_ref is set on PR events; ref_name covers push and other
          # events so checkout lands on a named branch (not detached HEAD)
          # and the later `git push` has somewhere to go.
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Checkout shared actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: PhenoML/sdk-shared-actions
          ref: ${{ github.workflow_sha }}
          path: .sdk-shared-actions

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install extraction script dependencies
        working-directory: .sdk-shared-actions/scripts/extract-code-examples
        run: bun install --frozen-lockfile

      - name: Extract code examples
        run: bun run .sdk-shared-actions/scripts/extract-code-examples/index.ts --root "$GITHUB_WORKSPACE"

      - name: Check for changes
        id: diff
        run: |
          git add code-examples.json
          if git diff --cached --quiet -- code-examples.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit code-examples.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update code-examples.json"
          git push
