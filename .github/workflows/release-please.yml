name: release-please

# Conventional-commit release automation for this repo's shared actions and
# reusable workflows. release-please maintains a rolling "release PR" off main:
# it keeps the next version + CHANGELOG staged, and merging that PR cuts the
# GitHub release and tags it.
#
# Crucially, the release also rewrites the sibling-action pins inside reusable
# workflows — every line marked `# x-release-please-version` is bumped to the
# new version — so the workflows and the composite actions they call are always
# released, and reference each other, in lockstep.
#
# Config: release-please-config.json (release-type, extra-files to bump).
# Current version: .release-please-manifest.json.
# Tags are unprefixed (1.0.0, not v1.0.0) to match how the actions are
# referenced throughout this repo (include-v-in-tag: false in the config).
#
# Token: because the release PR rewrites action pins *inside*
# .github/workflows/, release-please has to commit files under
# .github/workflows/. GitHub forbids the default GITHUB_TOKEN from writing
# workflow files ("without `workflows` permission"), and `workflows` is not a
# grantable scope on GITHUB_TOKEN — so it fails with "Error adding to tree".
# We mint a GitHub App token instead; the App must have Contents, Pull
# requests, Issues and Workflows = write. Set RELEASE_PLEASE_APP_CLIENT_ID
# (the App's Client ID, not the numeric App ID) and RELEASE_PLEASE_APP_PRIVATE_KEY
# repo secrets to the App's credentials.

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
