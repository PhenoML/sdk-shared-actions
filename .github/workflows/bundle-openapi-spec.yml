name: bundle-openapi-spec

# Reusable workflow: fetches the combined OpenAPI spec for the SDK's source
# commit from GCS and auto-commits it to the calling PR's branch.
#
# Trigger this from each SDK repo on PRs that change .fern/metadata.json
# (i.e. Fern opening or updating a generated-SDK PR with a new
# originGitCommit). The spec itself is published to GCS by phenoml_backend's
# publish-openapi-specs.yml workflow keyed by the same commit SHA. Fetching
# retries up to ~5 minutes to absorb the race between Fern opening the SDK
# PR and the spec-publish workflow finishing.
#
# Usage — in each SDK repo, add .github/workflows/bundle-openapi-spec.yml:
#
#   name: bundle-openapi-spec
#   on:
#     pull_request:
#       types: [opened, synchronize, reopened]
#       paths:
#         - ".fern/metadata.json"
#   jobs:
#     bundle:
#       uses: PhenoML/sdk-shared-actions/.github/workflows/bundle-openapi-spec.yml@v1
#
# Pin callers to a tag (e.g. @v1). All logic lives in this file, so the tag
# fully determines behavior.

on:
  workflow_call:
    inputs:
      metadata-path:
        description: "Path to Fern's metadata.json within the caller repo."
        type: string
        default: ".fern/metadata.json"
      output-path:
        description: "Where to write the bundled spec within the caller repo."
        type: string
        default: "openapi/openapi.json"

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Fork PRs can't push back to the head branch, and we don't want to leak
    # tokens to forked code anyway. Fern's bot opens PRs from same-repo
    # branches, so this only excludes the (currently unused) fork path.
    if: github.event.pull_request.head.repo.full_name == github.repository

    env:
      # Quoted indirection: keeps untrusted ref values out of inline ${{ }}
      # shell expansions per GitHub's workflow-injection guidance.
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      METADATA_PATH: ${{ inputs.metadata-path }}
      OUTPUT_PATH: ${{ inputs.output-path }}

    steps:
      - name: Checkout caller PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.HEAD_REF }}

      - name: Fetch combined OpenAPI spec
        run: |
          commit_sha=$(jq -r .originGitCommit "$METADATA_PATH")
          if [ -z "$commit_sha" ] || [ "$commit_sha" = "null" ]; then
            echo "originGitCommit missing from $METADATA_PATH" >&2
            exit 1
          fi
          echo "Fetching OpenAPI spec for originGitCommit=$commit_sha"
          mkdir -p "$(dirname "$OUTPUT_PATH")"
          # --retry-all-errors covers 404s while GCS upload is still in flight;
          # --retry-max-time caps the total wait at ~5 minutes.
          curl --fail --silent --show-error \
            --retry 10 --retry-delay 5 --retry-max-time 300 --retry-all-errors \
            -o "$OUTPUT_PATH" \
            "https://storage.googleapis.com/phenoml-openapi-specs/combined/specs-${commit_sha}.json"

      - name: Commit spec if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUTPUT_PATH"
          # Use --cached so a brand-new (previously untracked) spec is also
          # detected; plain `git diff` would report no change for it.
          if git diff --cached --quiet -- "$OUTPUT_PATH"; then
            echo "Spec unchanged; nothing to commit."
            exit 0
          fi
          commit_sha=$(jq -r .originGitCommit "$METADATA_PATH")
          git commit -m "chore: bundle OpenAPI spec for ${commit_sha}"
          git push
